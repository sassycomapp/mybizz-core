prompt: |

  ## STEP 1 — SAFETY CHECK — HUMAN GATE
  Do not read any file. Do not list any directory. Do not create anything.
  Ask the developer: "Have you taken a manual backup before this run?
  Reply YES to continue or NO to stop."
  If the reply is not YES: write developer_action "Manual backup required
  before Uplink tests", stop here, do not proceed.

  ## SOURCE FILES

  - path: "C:\\_Data\\_Mybizz\\mybizz-core\\server_code\\server_settings\\service.py"
    reason: "PRIMARY — all @anvil.server.callable functions under test."
  - path: "C:\\_Data\\_Mybizz\\mybizz-core\\anvil.yaml"
    reason: "Schema verification only — read only the tables listed in
             the schema excerpt below, nothing else."

  Read only the files listed above. Do not read, list, or access any
  other file or directory in the repository or file system.

  ## SENTINEL PREFIX
  All test data written during this run must use the prefix: TEST_
  For single-row config tables: capture pre-test state, restore after every
  test regardless of pass or fail. Never delete a config row.

  ## STEP 2 — VERIFY SCHEMA
  Read anvil.yaml. Verify only these tables and columns exist.
  Do not read or report on any other part of anvil.yaml.
  For any missing table or column: write developer_action, mark all
  dependent tests as SKIPPED.

  - business_profile: business_name, tagline, description, logo,
      contact_email, phone, address_line_1, address_line_2, city,
      country, postal_code, website_url, social_facebook,
      social_instagram, social_x, social_linkedin, updated_at

  - email_config: email_provider, smtp_host, smtp_port, smtp_username,
      smtp_password, from_email, from_name, configured, configured_at

  - payment_config: active_gateway, stripe_publishable_key,
      stripe_secret_key, stripe_connected, stripe_connected_at,
      paystack_public_key, paystack_secret_key, paystack_connected,
      paystack_connected_at, paypal_client_id, paypal_secret,
      paypal_connected, paypal_connected_at, test_mode, configured_at

  - theme_config: primary_color, accent_color, font_family,
      header_style, updated_at

  ## SERVER FUNCTIONS AND TEST SCENARIOS

  get_business_profile:
    - Authenticated, row exists → success, all fields returned
    - Authenticated, table empty → success, empty dict returned
    - Unauthenticated → failure, 'Not authenticated'
    - logo field → returned as URL string, not raw media object

  save_business_profile:
    - Authenticated, valid data → success, row written correctly
    - Authenticated, no existing row → success, new row created
    - Unauthenticated → failure, 'Not authenticated'
    - Adversarial: SQL injection string in business_name → stored
      safely as plain string, no exception leak
    - Adversarial: 10000-char string in description → stored safely
    - logo_file=None → existing logo column value not modified

  get_email_config:
    - Authenticated, smtp_password set → returned as '***', never plaintext
    - Authenticated, smtp_password empty or None → returned as ''
    - Authenticated, table empty → success, empty dict
    - Unauthenticated → failure, 'Not authenticated'

  save_email_config:
    - Authenticated, valid data → success, configured set to False
    - Authenticated, row already has configured=True → reset to False after save
    - Unauthenticated → failure, 'Not authenticated'

  get_payment_config:
    - Authenticated, all three secret keys set → each returned as '***',
      never plaintext
    - Authenticated, secret keys empty or None → each returned as ''
    - Unauthenticated → failure, 'Not authenticated'

  save_payment_config:
    - Authenticated, valid non-secret data → success, row written
    - Secret boundary: stripe_secret_key passed in data dict →
      column value in database unchanged after save
    - Secret boundary: paystack_secret_key passed in data dict →
      column value in database unchanged after save
    - Secret boundary: paypal_secret passed in data dict →
      column value in database unchanged after save
    - Unauthenticated → failure, 'Not authenticated'

  get_theme_config:
    - Authenticated, row exists → success, all fields returned
    - Authenticated, table empty → success, empty dict
    - Unauthenticated → failure, 'Not authenticated'

  save_theme_config:
    - Authenticated, valid data → success, row written correctly
    - Unauthenticated → failure, 'Not authenticated'

  ## OUTPUT FILES
  Test file:   C:\_Data\_Mybizz\mybizz-core\tests\test_1.4_settings_uplink.py
  Run record:  C:\_Data\_Mybizz\mybizz-core\tests\1.4-test-uplink-run.yaml
  Report:      C:\_Data\_Mybizz\mybizz-core\tests\1.4-test-uplink-report.yaml

  ## STEP 3 — WRITE TESTS
  Write complete Uplink integration tests covering all scenarios above.
  Every test must capture pre-test row state and restore it after,
  regardless of pass or fail.
  Write the complete test file to:
    C:\_Data\_Mybizz\mybizz-core\tests\test_1.4_settings_uplink.py
  Write the initial run record (status blank) to:
    C:\_Data\_Mybizz\mybizz-core\tests\1.4-test-uplink-run.yaml

  ## STEP 4 — RUN TESTS
  Execute all tests via Uplink against the live app.
  Restore pre-test row state after every test regardless of pass or fail.
  Record pass/fail/skipped in:
    C:\_Data\_Mybizz\mybizz-core\tests\1.4-test-uplink-run.yaml

  ## STEP 5 — REMEDIATE AUTO-FIXABLE FAILURES
  For each failed test:
    1. Determine if auto-fixable (code logic) or not (schema, environment)
    2. If auto-fixable: fix the source function, re-run to confirm
    3. If not auto-fixable: write developer_action, do not attempt a fix
    4. Never weaken a security check to pass a test
    5. Never modify a test to match wrong behaviour

  ## STEP 6 — CLEANUP VERIFICATION
  Confirm all four config tables are in their pre-test state.
  If any row remains modified: restore and note in report.

  ## STEP 7 — WRITE REPORT
  Write final state to:
    C:\_Data\_Mybizz\mybizz-core\tests\1.4-test-uplink-report.yaml
  Current state only — not history.
  developer_actions lists only items requiring human intervention.
  If all tests pass after remediation, developer_actions is empty.

  End with: # UPLINK TESTING COMPLETE — Stage 1.4 Settings & Configuration
