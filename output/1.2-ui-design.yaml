  # ═══════════════════════════════════════════════════════════════════════════
  # FORM 3 — PasswordResetForm
  # Package: client_code/auth/
  # Layout: BlankLayout (no navigation — unauthenticated context)
  # Spec: spec_build_plan.md §1.2
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "PasswordResetForm"
    path: "client_code/auth/PasswordResetForm"
    layout: "BlankLayout"
    package: "client_code/auth/"

    component_tree: |
      form_root
      └─ col_center (ColumnPanel)
         └─ card_reset (Card — outlined)
            ├─ lbl_title (Heading — headline-small)
            ├─ txt_email (TextBox — outlined)
            └─ btn_send_reset (Button — filled)

    components:
      - name: "col_center"
        type: "ColumnPanel"
        parent: "form_root"
      - name: "card_reset"
        type: "Card"
        parent: "col_center"
      - name: "lbl_title"
        type: "Heading"
        parent: "card_reset"
      - name: "txt_email"
        type: "TextBox"
        parent: "card_reset"
      - name: "btn_send_reset"
        type: "Button"
        parent: "card_reset"

    # FIX 3: explicit empty list — avoids null parse errors in Task 3
    designer_only_properties: []

    programmatic_properties:
      - component: "card_reset"
        property: "appearance"
        value: "outlined"
        set_when: "__init__"
        notes: "M3 Card appearance enum. Confirmed programmatic."

      - component: "lbl_title"
        property: "style"
        value: "headline"
        set_when: "__init__"

      - component: "lbl_title"
        property: "scale"
        value: "small"
        set_when: "__init__"
        notes: "headline-small per spec_build_plan.md §1.2."

      - component: "lbl_title"
        property: "text"
        value: "Reset Password"
        set_when: "__init__"

      - component: "txt_email"
        property: "appearance"
        value: "outlined"
        set_when: "__init__"
        notes: "M3 TextBox appearance enum. Confirmed programmatic."

      - component: "txt_email"
        property: "label"
        value: "Email"
        set_when: "__init__"

      - component: "txt_email"
        property: "placeholder"
        value: "Enter your email address"
        set_when: "__init__"

      - component: "txt_email"
        property: "error"
        value: "True on invalid; False on valid"
        set_when: "validate_form()"
        notes: "M3 TextBox error property (boolean)."

      - component: "btn_send_reset"
        property: "appearance"
        value: "filled"
        set_when: "__init__"
        notes: "M3 Button appearance enum. Confirmed programmatic. Primary action."

      - component: "btn_send_reset"
        property: "text"
        value: "Send Reset Link"
        set_when: "__init__"

      - component: "btn_send_reset"
        property: "enabled"
        value: "False after first click — prevents duplicate submissions"
        set_when: "_handle_send_reset()"
        notes: "Set btn_send_reset.enabled=False immediately before server call."

    # FIX 1: self.item added — consistent with mandatory rule across all forms
    data_binding:
      self_item_initial_value: "{'email': ''}"
      set_before_init_components: true
      write_back_components: []
      notes: "PasswordResetForm uses self.item for consistency with mandatory pattern. txt_email.text read directly in handler — no Write Back binding required on this form."

    server_calls:
      - function: "reset_password"
        trigger: "btn_send_reset click"
        args: ["self.txt_email.text"]
        on_success: "show Notification: 'If that email is registered, a reset link has been sent' — identical message always (enumeration prevention, OWASP A07:2021)"
        on_failure: "show identical Notification — never reveal whether email exists"
