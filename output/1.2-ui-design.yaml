        parent: "card_signup"
      - name: "txt_confirm_password"
        type: "TextBox"
        parent: "card_signup"
      - name: "txt_business_name"
        type: "TextBox"
        parent: "card_signup"
      - name: "cb_agree_terms"
        type: "Checkbox"
        parent: "card_signup"
      - name: "btn_create_account"
        type: "Button"
        parent: "card_signup"

    designer_only_properties:
      - component: "txt_password"
        property: "type"
        value: "password"
        verified_by: "anvil-docs-mcp"
        flag: "AMBIGUOUS — M3 API page truncated before TextBox. Defaulting to designer-only. Human developer must set type=password in Designer Properties Panel."

      - component: "txt_confirm_password"
        property: "type"
        value: "password"
        verified_by: "anvil-docs-mcp"
        flag: "AMBIGUOUS — same as txt_password above."

      - component: "cb_agree_terms"
        property: "write_back"
        value: true
        verified_by: "anvil-docs-mcp"
        notes: "Data Bindings write-back toggle. Designer Properties Panel only. Bind checked to self.item['agree_terms']. Enable W toggle."

    programmatic_properties:
      - component: "card_signup"
        property: "appearance"
        value: "outlined"
        set_when: "__init__"
        notes: "M3 Card appearance enum. Confirmed programmatic."

      - component: "lbl_title"
        property: "style"
