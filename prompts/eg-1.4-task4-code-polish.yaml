# ── STATIC BLOCK — CACHED AFTER FIRST CALL ──────────────────────────────────

  POLISH CHECKLIST — RUN AGAINST EVERY FILE:

  1. RESPONSE ENVELOPE
     Every @anvil.server.callable returns {'success':bool, 'data'/'error':...}
     No raw returns. No exceptions escaping to the client.

  2. AUTHENTICATION
     Every server function checks anvil.users.get_user() at entry.
     Returns {'success': False, 'error': 'Not authenticated'} if None.

  3. LOGGING
     logger = logging.getLogger(__name__) at module top — server files only.
     logger.info() at entry of every @anvil.server.callable.
     DEBUG for steps. WARNING recoverable. ERROR with exc_info=True unexpected.
     No personal data in log entries — email domain only, never full address.
     No print() anywhere in server code.

  4. EXCEPTIONS — SERVER
     No bare except. Named exceptions only. Specific before general.
     Named exception handlers return generic user-facing strings only —
     never str(exc). Keep logger.error(exc_info=True) server-side.
       Correct:   return {'success': False, 'error': 'A data error occurred'}
       Wrong:     return {'success': False, 'error': str(exc)}
     Defensive assert guards: except AssertionError: raise must appear
     BEFORE any broader except clause.
       # Hard fail — programmer error, must not be swallowed
     AssertionError is a subclass of Exception — verify it is not
     reachable by the general handler.
     No silent pass. No swallowed errors.

  5. CLIENT-SIDE SERVER CALLS
     Every anvil.server.call(...) is wrapped in try/except.
     anvil.server.TimeoutError caught separately — timeout message shown.
     anvil.server.AnvilWrappedError caught separately — error message shown.
     No raw tracebacks exposed to the user at any call site.

  6. EVENT HANDLERS
     Handlers contain zero logic. They call methods only.

  7. FORM INITIALISATION
     Auth check before init_components().
     open_form() → return immediately.

  8. COMPONENT NAMES
     Every self.component_name matches the stage spec exactly.
     No component referenced that is not in the spec.

  9. DESIGNER VS PROGRAMMATIC
     Properties settable in Designer are not set in code.
     Properties not settable in Designer are set in code with a comment.

  10. DATA ACCESS
      No Data Tables access in client files. Ever.

  11. SECURITY
      instance_id never sourced from client.
      Secret keys never returned to client — '***' if set, '' if not.
      RBAC check present on all server functions that require it.
      Columns that must never be written are absent from all write dicts.

  12. TYPE HINTS AND DOCSTRINGS
      All public and private functions have type hints.
      Every function has a docstring with all three sections:
        Args, Returns, Raises — "None" is acceptable for any section.
      No function has a partial docstring. All three sections or none.

  13. IMPORTS
      No unused imports in any file.
      Every imported module is referenced at least once in the file.

  14. COMPLETENESS
      No TODOs. No placeholder stubs. No pass-only functions.
      Every function fully implemented and runnable.
      All indentation correct — misaligned blocks are a syntax error.

  15. SCHEMA
      Every column name accessed matches the schema provided.

# ── END STATIC BLOCK ─────────────────────────────────────────────────────────

