# ── STATIC BLOCK — CACHED AFTER FIRST CALL ──────────────────────────────────

  POLISH CHECKLIST — RUN AGAINST EVERY FILE:

  1. RESPONSE ENVELOPE
     Every @anvil.server.callable returns {'success':bool, 'data'/'error':...}
     No raw returns. No exceptions escaping to the client.

  2. AUTHENTICATION
     Every server function checks anvil.users.get_user() at entry.
     Returns {'success': False, 'error': 'Not authenticated'} if None.

  3. LOGGING
     logger = logging.getLogger(__name__) at module top — server files only.
     INFO at entry. DEBUG for steps. WARNING recoverable. ERROR unexpected.
     No print() anywhere in server code.

  4. EXCEPTIONS
     No bare except. Named exceptions only. Specific before general.
     No silent pass. No swallowed errors.

  5. EVENT HANDLERS
     Handlers contain zero logic. They call methods only.

  6. FORM INITIALISATION
     Auth check before init_components().
     self.item before init_components(**properties).
     open_form() → return immediately.

  7. COMPONENT NAMES
     Every self.component_name matches the stage spec exactly.
     No component referenced that is not in the spec.

  8. DESIGNER VS PROGRAMMATIC
     Properties settable in Designer are not set in code.
     Properties not settable in Designer are set in code with a comment.

  9. DATA ACCESS
     No Data Tables access in client files. Ever.

  10. SECURITY
      instance_id never sourced from client.
      Secret keys never returned to client — '***' if set, '' if not set.
      RBAC check present on all server functions that require it.
      Columns that must never be written are absent from all write dicts.

  11. TYPE HINTS AND DOCSTRINGS
      All public functions have type hints.
      All non-trivial functions have docstrings: Args, Returns, Raises.

  12. COMPLETENESS
      No TODOs. No placeholder stubs. No pass-only functions.
      Every function fully implemented and runnable.
      All indentation correct — misaligned blocks are a syntax error.

  13. SCHEMA
      Every column name accessed matches the schema from Task 3.

# ── END STATIC BLOCK ─────────────────────────────────────────────────────────

