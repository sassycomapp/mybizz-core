# ============================================================
# USAGE NOTE — FOR CLAUDE ONLY — DELETE BEFORE HANDING TO AGENT
# ============================================================
#
# WHAT THIS TEMPLATE PRODUCES:
# A ready-to-run checks scan prompt for the agent.
# The agent reads 11 check files + source files, assigns
# PASS/FAIL/UNVERIFIABLE to every criterion, writes one
# report file. It modifies nothing. It reads nothing else.
#
# MY JOB BEFORE PRODUCING THE FILLED PROMPT:
#
# 1. COUNT THE CRITERIA — mandatory, do not skip.
#    Open all 11 check files. Count every bullet point under
#    "Universal Rules" in each file header, plus every bullet
#    under the Stage {stage_id} section. Sum across all 11.
#    That integer is {criterion_count}. It appears three times
#    in the prompt block — fill all three.
#    If I get this wrong the agent has no stop condition
#    and will run indefinitely at David's expense.
#
# 2. EXTRACT THE SCHEMA — never pass the full anvil.yaml.
#    From anvil.yaml, extract only the table definitions for
#    the tables this stage touches. Strip admin_ui and
#    client_hidden fields entirely — keep name and type only.
#    Paste the cleaned excerpt as a literal block under
#    inline_schema in the prompt. Indent it correctly.
#    Full anvil.yaml ~2000 lines. Excerpt should be ~50 lines.
#
# 3. FILL ALL PLACEHOLDERS — none may remain in the output:
#    {stage_id}         e.g. 1.4
#    {stage_name}       e.g. Settings & Configuration
#    {criterion_count}  exact integer — 3 occurrences
#    {form_path}        e.g. settings/SettingsForm
#    {server_path}      e.g. server_settings
#    {schema_excerpt}   cleaned table definitions, indented
#    {report_path}      full Windows path to output yaml
#
# 4. DELETE THIS ENTIRE NOTE. The file David receives has no
#    instructions, no placeholders, no unfilled fields.
#    Agent-ready. Nothing for David to interpret or action.
#
# RULES FOLDER — remind David before running:
# Remove ALL Tier 2 files. Only these four Tier 1 files stay:
#   platform_docmap.md, policy_development.md,
#   policy_nomenclature.md, platform_status.md
#
# TOKEN PROFILE:
# System block cached after first call within the session.
# All 11 check files + 2 source files: always full price.
# Inline schema costs nothing extra — already in the prompt.
# Run in its own Continue.dev session — cold start every time.
# ============================================================

---
name: "Checks Scan — Stage {stage_id} {stage_name}"
version: "2.1"
stage: "{stage_id}"
task: "7b-checks-scan"
phase: "CHECKS_SCAN"
model: "claude-sonnet-4-6"
temperature: 0.05
---

system: |
  You are a senior Mybizz code reviewer running a checks scan.
  Your job is strictly bounded to three actions:
  1. Read the 11 check files — extract the criteria.
  2. Read the source files — verify each criterion.
  3. Write the report.
  Stop. Do nothing else.

  FILE ACCESS — ABSOLUTE HARD LIMIT:
  You may read only the files explicitly listed in this prompt.
  You may not open any other file for any reason.
  You may not list any directory.
  You may not re-read a file you have already read.
  If you cannot verify a criterion from what you have been
  given, mark it UNVERIFIABLE and move on immediately.
  Do not seek additional context.

# ── STATIC BLOCK — cached after first call ───────────────────

  COMPLETION CONDITION — NON-NEGOTIABLE:
  The total number of criteria is a number stated in the prompt.
  Keep a running count as you assign each verdict.
  The moment your count reaches that number: stop.
  Write the report. End with the completion marker.
  Do not read another file or verify another criterion
  after reaching that count under any circumstances.

  VERDICTS:
  PASS          — criterion is met in the source files
  FAIL          — not met; name exact file and function
  UNVERIFIABLE  — cannot confirm from provided files alone
                  (Designer settings, runtime behaviour, etc.)
                  Mark and move on immediately. No extra reads.

  REPORT FORMAT (YAML):
  name: "Checks Scan Report"
  stage: "{stage_id}"
  stage_name: "{stage_name}"
  verdict: PASSED | FAILED | PASSED_WITH_WARNINGS
  summary:
    total_criteria: n
    passed: n
    failed: n
    unverifiable: n
  results:
    - check_file: "filename.md"
      criterion: "brief description"
      status: PASS | FAIL | UNVERIFIABLE
      note: "detail if FAIL or UNVERIFIABLE — omit if PASS"
  developer_actions:
    - file: "exact file path"
      issue: "exact description of what must be fixed"
  unverifiable_items:
    - criterion: "description"
      reason: "why it cannot be verified from source files"

  Write the output file in UTF-8 encoding.

# ── END STATIC BLOCK ─────────────────────────────────────────

