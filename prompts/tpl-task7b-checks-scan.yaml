prompt: |
  Stage to scan: {stage_id} — {stage_name}
  Total criteria: {criterion_count}
  Stop the moment your running count reaches {criterion_count}.

  ## SOURCE FILES — read these and nothing else
  - path: "C:\\_Data\\_Mybizz\\mybizz-core\\client_code\\{form_path}\\__init__.py"
    reason: "Client scan target — read once."
  - path: "C:\\_Data\\_Mybizz\\mybizz-core\\server_code\\{server_path}\\service.py"
    reason: "Server scan target — read once."
  - inline_schema: |
      {schema_excerpt}
    reason: "Schema reference — already in prompt, no file read needed."

  ## STEP 1 — Read all 11 check files (once each, do not re-read)
  Extract every criterion: Universal Rules header + Stage {stage_id} section.
  You must have exactly {criterion_count} criteria when done.
  If your count differs, note the discrepancy in the report summary
  and proceed — do not open any file to resolve it.

  ## STEP 2 — Read all source files (once each, do not re-read)
  Read each file listed above once. Do not re-read any file.

  ## STEP 3 — Verify each criterion
  Work through your list one by one. Assign PASS, FAIL, or UNVERIFIABLE.
  If uncertain: mark UNVERIFIABLE immediately — do not re-read any file.
  Increment your count after each verdict.
  When count = {criterion_count}: stop immediately.

  ## STEP 4 — Write report
  Output to: {report_path}
  End with: # CHECKS SCAN COMPLETE — Stage {stage_id} {stage_name}
