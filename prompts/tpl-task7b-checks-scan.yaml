prompt: |

  Stage to scan: {{stage_id}} — {{stage_name}}

  ## SOURCE FILES
  {{source_files}}

  ## STEP 1 — READ ALL CHECK FILES
  Read all 11 check files. For Stage {{stage_id}}, verify both the
  Universal Rules in each file header and the Stage {{stage_id}} section.

  ## STEP 2 — READ ALL SOURCE FILES
  Read every source file listed above in full.

  ## STEP 3 — VERIFY EACH CRITERION
  For every criterion in every check file, verify it against the source files.
  Mark each criterion PASS, FAIL, or UNVERIFIABLE per the scan rules above.

  ## STEP 4 — WRITE REPORT
  Write the scan report to: {{report_path}}

  End with: # CHECKS SCAN COMPLETE — Stage {{stage_id}} {{stage_name}}
