prompt: |

  ## SOURCE FILES

  - path: "C:\\_Data\\_Mybizz\\mybizz-core\\client_code\\settings\\SettingsForm\\__init__.py"
    reason: "Validation logic — _validate_business(), _validate_email(),
             _set_field_error(), _clear_field_error()."

  - path: "C:\\_Data\\_Mybizz\\mybizz-core\\server_code\\server_settings\\service.py"
    reason: "Masking logic — get_email_config(), get_payment_config(),
             save_payment_config() secret column exclusion."

  ## TEST CATEGORIES REQUIRED

  1. _validate_business() — business_name required
     False when empty, whitespace-only, or None. True when populated.

  2. _validate_business() — contact_email required
     False when empty, whitespace-only, or None. True when populated.

  3. _validate_email() — from_email required
     False when empty or whitespace-only. True when populated.

  4. _validate_email() — smtp_port must be numeric
     False for 'abc', '0.5', ''. True for '587', '0', '65535', '-1'.
     Cover boundary: '0', '65535', '587', '-1', '0.5', 'abc', '', ' '.

  5. Hex colour validation — #RRGGBB format
     If hex validation logic exists: '#1A73E8' valid, '#ZZZ' invalid,
     'no-hash' invalid, '#1A73E8FF' too long, '' empty, None.
     If no hex validation function exists: note as developer_action
     (missing validation — not a test failure).

  6. _save_payments() outbound dict — secret keys absent
     stripe_secret_key, paystack_secret_key, and paypal_secret must
     NOT be present as keys in the outbound dict under any circumstances.

  7. get_email_config() masking — smtp_password never plaintext
     '***' when smtp_password has a value. '' when empty or None.
     Never the raw value under any input.

  8. get_payment_config() masking — all three secret keys never plaintext
     stripe_secret_key, paystack_secret_key, paypal_secret:
     '***' when set. '' when empty or None. Never the raw value.

  ## OUTPUT FILES
  Test file:   C:\_Data\_Mybizz\mybizz-core\tests\test_1.4_settings.py
  Run record:  C:\_Data\_Mybizz\mybizz-core\tests\1.4-test-local-run.yaml
  Report:      C:\_Data\_Mybizz\mybizz-core\tests\1.4-test-local-report.yaml

  Run command: pytest -v --import-mode=importlib tests/test_1.4_settings.py

