prompt: |

  ## STEP 1 — SAFETY CHECK — HUMAN GATE
  Do not read any file. Do not list any directory. Do not create anything.
  Ask the developer: "Have you taken a manual backup before this run?
  Reply YES to continue or NO to stop."
  If the reply is not YES: write developer_action "Manual backup required
  before Uplink tests", stop here, do not proceed.

  ## SOURCE FILES

  - path: "C:\\_Data\\_Mybizz\\mybizz-core\\server_code\\server_auth\\service.py"
    reason: "PRIMARY — all @anvil.server.callable functions under test."
  - path: "C:\\_Data\\_Mybizz\\mybizz-core\\anvil.yaml"
    reason: "Schema verification only — open file, locate only the tables
             listed in the schema excerpt below, read nothing else."

  Read only the files listed above. Do not read, list, or access any
  other file or directory in the repository or file system.

  ## SENTINEL PREFIX
  All test data written during this run must use the prefix: TEST_
  Applies to every email address, name, and identifier written to any table.
  After every test: delete any TEST_ rows created. Restore any modified rows.

  ## STEP 2 — VERIFY SCHEMA
  Open anvil.yaml. Locate and read only the tables listed below.
  Do not read or report on any other part of anvil.yaml.
  For any missing table or column: write developer_action, mark all
  dependent tests as SKIPPED.

  - users: role, account_status, permissions, last_login, created_at
  - tbl_rate_limits: identifier, count, reset_time, last_request

  ## SERVER FUNCTIONS AND TEST SCENARIOS

  authenticate_user:
    - Valid credentials → success, role returned
    - Wrong password → failure, error contains no role data
    - Non-existent email → failure, identical error to wrong password
      (enumeration prevention — both must return the same message)
    - Rate limit: 10 consecutive failures → 11th attempt blocked
    - Rate limit reset: successful login after failures resets counter
    - Unauthenticated context, empty credentials → validation failure

  create_user:
    - Valid new user → success, role set to owner
    - Duplicate email → clear error, no duplicate row created
    - Weak password (< 8 chars) → rejected server-side
    - Empty business name → rejected
    - SQL injection in email field → rejected safely, no exception leak

  reset_password:
    - Registered email → success message returned
    - Unregistered email → identical success message (enumeration prevention)
    - Invalid email format → identical success message (enumeration prevention)

  ## OUTPUT FILES
  Test file:   C:\_Data\_Mybizz\mybizz-core\tests\test_1.2_auth_uplink.py
  Run record:  C:\_Data\_Mybizz\mybizz-core\tests\1.2-test-uplink-run.yaml
  Report:      C:\_Data\_Mybizz\mybizz-core\tests\1.2-test-uplink-report.yaml

  ## STEP 3 — WRITE TESTS
  Write complete Uplink integration tests covering all scenarios above.
  Every test must capture pre-test state and restore it after,
  regardless of pass or fail.
  TEST_ rows created during tests must be deleted after each test.
  Write the complete test file to:
    C:\_Data\_Mybizz\mybizz-core\tests\test_1.2_auth_uplink.py
  Write the initial run record (status blank) to:
    C:\_Data\_Mybizz\mybizz-core\tests\1.2-test-uplink-run.yaml

  ## STEP 4 — RUN TESTS
  Execute all tests via Uplink against the live app.
  Clean up TEST_ data after every test regardless of pass or fail.
  Record pass/fail/skipped in:
    C:\_Data\_Mybizz\mybizz-core\tests\1.2-test-uplink-run.yaml

  ## STEP 5 — REMEDIATE AUTO-FIXABLE FAILURES
  For each failed test:
    1. Determine if auto-fixable (code logic) or not (schema, environment)
    2. If auto-fixable: fix the source function, re-run to confirm
    3. If not auto-fixable: write developer_action, do not attempt a fix
    4. Never weaken a security check to pass a test
    5. Never modify a test to match wrong behaviour

  ## STEP 6 — CLEANUP VERIFICATION
  Confirm no TEST_-prefixed rows remain in users or tbl_rate_limits.
  If any remain: delete them and note in report.

  ## STEP 7 — WRITE REPORT
  Write final state to:
    C:\_Data\_Mybizz\mybizz-core\tests\1.2-test-uplink-report.yaml
  Current state only — not history.
  developer_actions lists only items requiring human intervention.
  If all tests pass after remediation, developer_actions is empty.

  End with: # UPLINK TESTING COMPLETE — Stage 1.2 Authentication
