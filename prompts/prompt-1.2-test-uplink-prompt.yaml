prompt: |
  ## SAFETY PROTOCOL — EXECUTE BEFORE ANY TEST
  Per ref_anvil_testing_integration.md:
  1. Confirm app backup exists before proceeding
  2. All test data uses sentinel value: email prefix TEST_ or name prefix TEST_
  3. Every test has defined cleanup steps before it runs
  If backup cannot be confirmed: stop, write developer_action, do not run tests.

  ## STEP 1 — VERIFY SCHEMA
  Read anvil.yaml. Confirm these tables exist with correct columns:
  - users (role, account_status, permissions, last_login, created_at)
  - tbl_rate_limits (identifier, count, reset_time, last_request)
  - tbl_audit_log (may not exist in Stage 1.2 — note but do not fail)
  If a required table or column is missing: write developer_action, skip affected tests.

  ## STEP 2 — WRITE INTEGRATION TESTS
  Write tests covering these scenarios for each @anvil.server.callable function:

  authenticate_user:
    - Valid credentials → success + role returned
    - Wrong password → failure + no role leak
    - Non-existent email → failure + identical error to wrong password
    - Rate limit: 10 consecutive failures → 11th blocked
    - Rate limit reset: success after failures resets counter
    - Empty email and password → validation failure before Anvil call

  create_user:
    - Valid new user → success + role=owner set
    - Duplicate email → clear error, no duplicate created
    - Weak password → rejected server-side (not just client)
    - Empty business name → rejected
    - SQL injection in email field → rejected safely

  reset_password:
    - Registered email → success message
    - Unregistered email → identical success message (enumeration prevention)
    - Invalid email format → success message (enumeration prevention)
    - Timing: registered vs unregistered response time must not differ significantly

  Write tests to: C:\_Data\_Mybizz\mybizz-core\tests\1.2-test-uplink-run.yaml

  ## STEP 3 — RUN TESTS
  Execute each test via Uplink against the live app.
  Run cleanup after every test regardless of pass/fail.
  Record actual result for each.

  ## STEP 4 — REMEDIATE AUTO-FIXABLE FAILURES
  Code failures (wrong logic, missing validation): fix source file, re-run test.
  Schema failures: write developer_action — do not auto-fix schema.
  Environment failures (Uplink, secrets): write developer_action.
  Never weaken a security check to pass a test.

  ## STEP 5 — CLEANUP VERIFICATION
  After all tests: confirm no TEST_ sentinel data remains in users or tbl_rate_limits.
  If cleanup incomplete: run cleanup and note in report.

  ## STEP 6 — WRITE REPORT
  Write to: C:\_Data\_Mybizz\mybizz-core\tests\1.2-test-uplink-report.yaml
  Current state only. Developer actions only if human input required.

