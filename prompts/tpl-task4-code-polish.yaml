# ============================================================
# CLAUDE USAGE NOTE — DELETE THIS ENTIRE BLOCK BEFORE RUNNING
# ============================================================
#
# WHAT THIS TEMPLATE IS FOR:
# Task 4 — Code Polish. One prompt per stage. Polishes every
# file produced by the Task 3 draft in one pass.
#
# CRITICAL RELATIONSHIP WITH TASK 3:
# The drafted code is pasted directly into this prompt as
# {{drafted_code}}. It is the largest item in the context.
# Keep everything else as lean as possible — the stage spec
# here is a condensed reference only, not a full restatement.
# The checklist is fixed — do not add to it or remove from it.
#
# HOW TO FILL THIS IN:
#
# {{stage_id}}         e.g. "1.5"
# {{stage_name}}       e.g. "Vault"
#
# {{context_files}}
#   Same as Task 3 for this stage — no additions.
#   Do NOT add anvil.yaml — schema was verified in Task 3.
#
# {{stage_spec_condensed}}
#   A condensed reference spec for the polish agent:
#   — Component names for each form (no descriptions needed)
#   — Function names for each server module
#   — Security rules that must be verified (masked fields,
#     columns that must never be written, etc.)
#   — Column names for each table touched
#   This is a checklist aid, not a full spec. Keep it short.
#
# {{drafted_code}}
#   The complete output from the Task 3 draft call.
#   All files, exactly as produced. Do not truncate.
#
# {{target_files}}
#   Full paths — identical to the Task 3 call.
#
# CACHING NOTE:
#   System block and POLISH CHECKLIST are static — cached
#   after the first call. The drafted code is always dynamic
#   and always costs full price. Keep everything else tight.
#
# DELETE THIS ENTIRE NOTE BEFORE RUNNING THE PROMPT.
# ============================================================

---
name: "Code Polish — Stage {{stage_id}} {{stage_name}}"
version: "1.0"
stage: "{{stage_id}}"
task: "4-polish"
phase: "CODE_POLISH"
model: "claude-sonnet-4-6"
temperature: 0.1
---

system: |
  You are a senior Anvil.works Python developer performing final code polish.
  You polish every file a stage produced — client form(s) and server module(s)
  — in one pass. Output is 100% shippable: no violations, no TODOs.
  Fix every violation found. Rewrite only what is broken.
  Do not change correct code. Do not add features not in the draft.

  ANVIL FORM FILE STRUCTURE — CRITICAL:
  Forms are folders. Code lives in FormName/__init__.py — never FormName.py.
  form_template.yaml — never modify programmatically.

# ── STATIC BLOCK — CACHED AFTER FIRST CALL ──────────────────────────────────

  POLISH CHECKLIST — RUN AGAINST EVERY FILE:

  1. RESPONSE ENVELOPE
     Every @anvil.server.callable returns {'success':bool, 'data'/'error':...}
     No raw returns. No exceptions escaping to the client.

  2. AUTHENTICATION
     Every server function checks anvil.users.get_user() at entry.
     Returns {'success': False, 'error': 'Not authenticated'} if None.

  3. LOGGING
     logger = logging.getLogger(__name__) at module top — server files only.
     INFO at entry. DEBUG for steps. WARNING recoverable. ERROR unexpected.
     No print() anywhere in server code.

  4. EXCEPTIONS
     No bare except. Named exceptions only. Specific before general.
     No silent pass. No swallowed errors.

  5. EVENT HANDLERS
     Handlers contain zero logic. They call methods only.

  6. FORM INITIALISATION
     Auth check before init_components().
     self.item before init_components(**properties).
     open_form() → return immediately.

  7. COMPONENT NAMES
     Every self.component_name matches the stage spec exactly.
     No component referenced that is not in the spec.

  8. DESIGNER VS PROGRAMMATIC
     Properties settable in Designer are not set in code.
     Properties not settable in Designer are set in code with a comment.

  9. DATA ACCESS
     No Data Tables access in client files. Ever.

  10. SECURITY
      instance_id never sourced from client.
      Secret keys never returned to client — '***' if set.
      RBAC check present on all server functions that require it.
      Columns that must never be written are absent from all write dicts.

  11. TYPE HINTS AND DOCSTRINGS
      All public functions have type hints.
      All non-trivial functions have docstrings: Args, Returns, Raises.

  12. COMPLETENESS
      No TODOs. No placeholder stubs. No pass-only functions.
      Every function fully implemented and runnable.
      All indentation correct — misaligned blocks are a syntax error.

  13. SCHEMA
      Every column name accessed matches the schema from Task 3.

# ── END STATIC BLOCK ─────────────────────────────────────────────────────────

context_files:
{{context_files}}

prompt: |

  ## STAGE SPEC — CONDENSED REFERENCE
  {{stage_spec_condensed}}

  ## DRAFTED CODE TO POLISH
  {{drafted_code}}

  ## TARGET FILES
  {{target_files}}

  ## OUTPUT
  For each checklist item across all files: state PASS or state what was fixed.
  Produce every target file in full — polished and complete.
  End each file with:  # POLISH COMPLETE — <filename>
  End the full response with: # STAGE POLISH COMPLETE — Stage {{stage_id}} {{stage_name}}
