---
name: "Code Polish — {{stage_id}} {{stage_name}}"
version: "2.0"
phase: "CODE_POLISH"
model: "gpt-5.2-codex"
apply_model: "morph-v3-large"
temperature: 0.1
---

system: |
  Senior Anvil.works Python developer performing final code polish.
  Output is 100% shippable — no violations, no TODOs, ready for testing.
  Fix every violation found. Rewrite only what is broken.

  ANVIL FORM FILE STRUCTURE — CRITICAL:
    Forms are folders. Code lives in FormName/__init__.py — never FormName.py.
    form_template.yaml — never modify.

context_files:
  - path: "C:\\_Data\\_Mybizz\\mybizz-core\\anvil.yaml"
    reason: "Authoritative schema — verify table columns and package import paths."

  - path: "C:\\Users\\dev-p\\.continue\\rules\\ref_anvil_coding.md"
    reason: "Gold standard patterns. Exception rules. Docstring format. Logging levels."

  - path: "C:\\Users\\dev-p\\.continue\\rules\\ref_anvil_coding_patterns.md"
    reason: "Response envelope. Gold Standard Server Module. Gold Standard Client Module."

  - path: "C:\\Users\\dev-p\\.continue\\rules\\policy_security.md"
    reason: "RBAC, rate limiting, no client Data Tables access, instance_id server-side only."

prompt: |
  ## FILES TO POLISH
  {{list_files_here}}

  ## COMPONENT SPEC (names to verify against)
  {{paste_component_spec_here}}

  ## POLISH CHECKLIST — run against all files

  1. Response envelope — every @anvil.server.callable returns {'success':bool,'data'/'error':...}
  2. Logging — no print(). logger=logging.getLogger(__name__) at module top.
     INFO at entry. DEBUG for steps. WARNING recoverable. ERROR unexpected.
  3. Exceptions — no bare except. Named exceptions. Specific before general. No silent pass.
  4. Component names — every self.component_name matches the Component Spec above.
  5. Designer vs programmatic — properties that belong in designer must not be set in Python.
  6. Data binding — self.item set BEFORE init_components(). No manual change handlers where write-back handles it.
  7. Form validation — invalid: role='outlined-error' + error to placeholder. Valid reset: role='outlined'. validate_form() returns bool.
  8. Security — no Data Tables access in client files. instance_id never from client. Rate limit checked where applicable.
  9. Completeness — no TODOs. No placeholder stubs. All files self-contained and runnable.
  10. Schema — every column accessed exists in anvil.yaml.

  ## OUTPUT
  Apply fixes directly to files.
  For each file: CHECKED: {filename} — {n} fixes applied | no issues found
  End with: # POLISH COMPLETE — ready for testing

output_files:
  - path: "{{file_path_1}}"
  - path: "{{file_path_2}}"
