  Validate format — return success even if invalid (enumeration prevention)
  send_password_reset_email (confirmed sig)
  _log_auth_event('password_reset_requested')
  Always return success envelope with identical message. Wrap all in try/except.

  check_permission(permission_name:str) -> dict
  get_user() → None: not-authenticated error
  owner → True. customer → False. Others: permissions.get(permission_name,False)
  Return {'success':True,'data':{'has_permission':bool}}

  get_current_user_info() -> dict
  get_user() → None: not-authenticated error
  Return {'success':True,'data':{email,role,permissions or {},account_status}}

