  authenticate_user(email:str, password:str) -> dict
  Validate inputs (fail fast) → _check_rate_limit(email) → login_with_email (confirmed sig)
  Success: user['last_login']=now, _reset_rate_limit, _log_auth_event('login_success')
  Return {'success':True,'data':{'role':user['role'],'email':user['email']}}
  Catch AuthenticationFailed (confirmed class name): _increment_rate_limit,
