prompt: |
  ## STEP 1 — IDENTIFY TESTABLE FUNCTIONS
  Read service.py and all three form files. Identify every function whose logic
  can be tested without Anvil or network:
  - _validate_password_strength()
  - _validate_email_format() or equivalent email validation logic
  - _check_rate_limit() logic (counter and window calculations only)
  - validate_form() in each form file
  - Any other pure logic function with no Anvil import in its execution path

  ## STEP 2 — WRITE TESTS
  Write complete pytest tests covering these categories for every function:

  Happy path: valid inputs that should pass
  Boundary: values at the exact edge of rules (e.g. exactly 8 chars, exactly 10 attempts)
  Adversarial: inputs designed to break or bypass (SQL injection, XSS, null bytes,
    Unicode, emoji, 10000+ char strings, whitespace-only, control characters)
  Edge case: empty string, None, wrong type, case sensitivity, leading/trailing spaces

  Write tests to: C:\_Data\_Mybizz\mybizz-core\tests\1.2-test-local-run.yaml
  Use the format specified in that file.

  ## STEP 3 — RUN TESTS
  Execute all tests via pytest against the extracted pure logic functions.
  Record pass/fail for each.

  ## STEP 4 — REMEDIATE FAILURES
  For each failed test:
  1. Identify root cause in the source function
  2. Fix the function — conform to ref_anvil_coding.md and policy_security.md
  3. Re-run test to confirm pass
  4. Never weaken a security check to pass a test — fix the code
  5. Never modify a test to match wrong behaviour — fix the code

  ## STEP 5 — WRITE REPORT
  Write final state to: C:\_Data\_Mybizz\mybizz-core\tests\1.2-test-local-report.yaml
  Report shows current state only — not history of what was wrong.
  If anything requires developer action, list it clearly under developer_actions.

