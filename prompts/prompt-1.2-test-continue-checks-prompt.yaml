prompt: |
  You are running at the completion of a stage. The stage number is provided
  in the task description or branch name. Read it carefully.

  ## STEP 1 — READ ALL EXISTING CHECK FILES
  Read all 11 check files listed in context_files. Understand what is already
  covered so you do not duplicate criteria.

  ## STEP 2 — READ THE STAGE SPEC
  Read spec_build_plan.md for the current stage. Extract:
  - What forms are created
  - What server functions are created
  - What tables are created
  - What navigation is added
  - What integrations are introduced

  ## STEP 3 — DERIVE NEW CRITERIA PER CHECK FILE
  For each of the 11 check files, derive the stage-specific criteria:

  Ask for each file: "What new things does this stage introduce that this
  check needs to verify?" Only add criteria that are NEW to this stage.
  Do not repeat universal rules already in the file header.

  If a stage introduces nothing new for a particular check file, add a
  minimal section: "## Stage {n} — {Name} — No new criteria for this check."

  ## STEP 4 — APPEND SECTIONS
  For each check file, append the new stage section at the end of the file.
  Format exactly:

  ## Stage {phase}.{stage} — {Stage Name}

  Look for these issues and fix them:

  - [specific, actionable criterion]
  - [specific, actionable criterion]

  Pass if [clear pass condition].

  ## RULES
  - Never modify existing sections — append only
  - Criteria must be specific and actionable — not "check security"
  - Each criterion must name the exact file, function, or component to check
  - If an Anvil API needs verification, use context7 to confirm before writing
  - Stage section heading must match the stage number exactly
  - Universal rules (already in file headers) must not be repeated in stage sections

