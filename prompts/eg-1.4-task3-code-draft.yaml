  Behaviour:
  - Four tab buttons switch panels. Active button role='filled',
    others role='outlined'. Default: col_business visible.
  - dd_active_gateway change shows matching gateway panel, hides others.
  - load_business_profile(), load_email_config(), load_payment_config(),
