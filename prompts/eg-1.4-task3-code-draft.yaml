    save_payment_config: never write _PAYMENT_SECRET_COLUMNS. Pattern:
      fields = {k: v for k, v in data.items() if k not in _PAYMENT_SECRET_COLUMNS}
      assert not (_PAYMENT_SECRET_COLUMNS & set(fields))  # programmer guard
      except AssertionError: raise  # Hard fail — must not be swallowed
      except tables.TableError as exc:
          logger.error(..., exc_info=True)
          return {'success': False, 'error': 'A data error occurred'}

  test_email_connection: reads SMTP credentials from email_config table only —
