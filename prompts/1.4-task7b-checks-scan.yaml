  The moment your count reaches that number: stop.
  Write the report. End with the completion marker.
  Do not read another file or verify another criterion
  after reaching that count under any circumstances.

  VERDICTS:
  PASS          — criterion is met in the source files
  FAIL          — not met; name exact file and function
  UNVERIFIABLE  — cannot confirm from provided files alone
                  (Designer settings, runtime behaviour, etc.)
                  Mark and move on immediately. No extra reads.

  REPORT FORMAT (YAML):
  name: "Checks Scan Report"
  stage: "1.4"
  stage_name: "Settings & Configuration"
  verdict: PASSED | FAILED | PASSED_WITH_WARNINGS
  summary:
    total_criteria: n
    passed: n
    failed: n
    unverifiable: n
  results:
    - check_file: "filename.md"
      criterion: "brief description"
      status: PASS | FAIL | UNVERIFIABLE
      note: "detail if FAIL or UNVERIFIABLE — omit if PASS"
  developer_actions:
    - file: "exact file path"
      issue: "exact description of what must be fixed"
  unverifiable_items:
    - criterion: "description"
      reason: "why it cannot be verified from source files"

  Write the output file in UTF-8 encoding.

# ── END STATIC BLOCK ─────────────────────────────────────────

