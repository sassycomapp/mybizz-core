# ============================================================
# CLAUDE USAGE NOTE — DELETE THIS ENTIRE BLOCK BEFORE RUNNING
# ============================================================
#
# WHAT THIS TEMPLATE IS FOR:
# Task 7a — Checks Build. Run once at the completion of each
# stage. Reads the stage spec, derives new criteria for each
# of the 11 check files, and appends a new stage section to
# each file. Never modifies existing sections — append only.
#
# WHEN TO RUN:
# After Task 6 (Uplink Testing) is complete. Run before
# closing the stage. Run in its own session.
#
# CACHING STRATEGY:
# The system block is static — cached after the first call.
# The 15 policy and rules source files are also static between
# stages — they do not change during normal development. They
# are eligible for caching within a session.
# The 11 check files are dynamic — they grow with every stage
# and cannot be cached. They are always full price.
# This task is inherently expensive. Do not add any file
# beyond the standard set. Every extra file multiplies cost
# with no quality benefit if not directly referenced.
#
# TOKEN BOUNDARIES — READ BEFORE FILLING:
#
# Policy/rules source files — these are the criteria sources.
# They are static and benefit from caching within a session.
# Do not remove any — each maps to one or more check files.
# Do not add any — undisciplined additions are pure waste.
#
# Check files — always dynamic, always full price.
# All 11 must be read before appending so the agent knows
# what is already covered and does not duplicate criteria.
# This read cost is unavoidable.
#
# {{stage_id}} / {{stage_name}}
# These are the only dynamic elements in the prompt block
# beyond what is in context_files. Keep the prompt block
# as short as possible — the work is driven by the files,
# not by elaborate instructions.
#
# APPEND-ONLY RULE — CRITICAL:
# The agent appends one new section to each of the 11 files.
# It never rewrites, restructures, or replaces existing content.
# If the agent produces a complete file rather than an appended
# section: do not save the output. Correct the instruction
# in the prompt and re-run. The agent has no memory of the
# previous attempt and will follow the corrected instruction.
#
# HOW TO FILL THIS IN:
#
# {{stage_id}}         e.g. "1.4"
# {{stage_name}}       e.g. "Settings & Configuration"
#
# That is all. The context_files list is hardcoded — do not
# modify it. The output file paths are hardcoded — do not
# modify them.
#
# DELETE THIS ENTIRE NOTE BEFORE RUNNING THE PROMPT.
# ============================================================

---
name: "Checks Build — Stage {{stage_id}} {{stage_name}}"
version: "1.0"
stage: "{{stage_id}}"
task: "7a-checks-build"
phase: "CHECKS_BUILD"
model: "claude-sonnet-4-6"
temperature: 0.05
---

system: |
  You are a senior Mybizz developer maintaining the continue.dev check files.
  Check files live in .continue/checks/ and are verified on every stage
  completion. Each file covers one concern. Each file grows stage by stage —
  new stages append a new section, existing sections are never modified.

  Your job for this run: read the stage spec, derive new criteria for the
  current stage, and append one new section to each of the 11 check files.

# ── STATIC BLOCK — CACHED AFTER FIRST CALL ──────────────────────────────────

  APPEND RULES — NON-NEGOTIABLE:
  Never modify existing sections — append only.
  Never rewrite, restructure, or replace any existing content.
  If you find yourself producing a complete file rather than an appended
  section: stop. Produce only the new section to append.
  Never repeat universal rules already in file headers.
  Criteria must be specific and actionable — not "check security".
  Each criterion must name the exact file, function, or component to check.
  If a stage introduces nothing new for a check file, append:
  "## Stage X.Y — Name — No new criteria for this check."

  SECTION FORMAT — every appended section must use this format exactly:

  ## Stage {phase}.{stage} — {Stage Name}

  Look for these issues and fix them:

  - [specific, actionable criterion naming exact file/function]
  - [specific, actionable criterion naming exact file/function]

  Pass if [clear pass condition].

# ── END STATIC BLOCK ─────────────────────────────────────────────────────────

